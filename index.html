<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <meta name="description" content="Formulario de registro de usuarios">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Círculos decorativos de fondo */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: #06b6d4;
            bottom: -80px;
            left: -80px;
        }

        .form-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-container h1 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-container p.subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.55);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            padding-left: 44px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .input-group .icon {
            position: absolute;
            left: 14px;
            top: 41px;
            font-size: 16px;
            opacity: 0.5;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #6d28d9, #5b21b6);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.35);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Mensaje de respuesta */
        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        /* Spinner en el botón */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 520px) {
            .form-container {
                padding: 32px 24px;
            }
            .form-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>📋 Registro</h1>
        <p class="subtitle">Completa el formulario para crear tu cuenta</p>

        <form id="registroForm">
            <div class="input-group">
                <label for="nombre">Nombre completo</label>
                <span class="icon">👤</span>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre" 
                    placeholder="Ej: Juan Pérez" 
                    required 
                    minlength="3"
                >
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <span class="icon">📧</span>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Ej: juan@correo.com" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <span class="icon">📱</span>
                <input 
                    type="tel" 
                    id="telefono" 
                    name="telefono" 
                    placeholder="Ej: 3001234567" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="documento">Documento</label>
                <span class="icon">🪪</span>
                <input 
                    type="text" 
                    id="documento" 
                    name="documento" 
                    placeholder="Ej: 1234567890" 
                    required
                >
            </div>

            <div class="input-group">
                <label for="contrasena">Contraseña</label>
                <span class="icon">🔒</span>
                <input 
                    type="password" 
                    id="contrasena" 
                    name="contrasena" 
                    placeholder="Mínimo 6 caracteres" 
                    required 
                    minlength="6"
                >
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                Registrarse
            </button>

            <div id="mensaje" class="message"></div>
        </form>
    </div>

    <!-- ============================================= -->
    <!-- SUPABASE: SDK cargado desde CDN               -->
    <!-- ============================================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // =============================================
        // 🔑 CREDENCIALES DE SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://hfljxypougtleafgfhsf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmbGp4eXBvdWd0bGVhZmdmaHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzczODksImV4cCI6MjA5Mjk1MzM4OX0.GkW2NjuJ0tS1AzE5GuyCZVIFoS0iHxl6wRvd_frWwsI';

        // =============================================
        // Referencias del DOM
        // =============================================
        const form = document.getElementById('registroForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const mensajeDiv = document.getElementById('mensaje');

        // Función para mostrar mensajes
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'message ' + tipo;
        }

        // =============================================
        // Verificar que Supabase se cargó correctamente
        // =============================================
        let supabaseClient = null;

        try {
            if (!window.supabase || !window.supabase.createClient) {
                throw new Error('El SDK de Supabase no se cargó. Verifica tu conexión a internet.');
            }
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase conectado correctamente');
        } catch (err) {
            console.error('❌ Error al inicializar Supabase:', err);
            mostrarMensaje('❌ Error: No se pudo conectar con la base de datos. Revisa la consola (F12).', 'error');
        }

        // =============================================
        // 📨 ENVÍO DEL FORMULARIO
        // =============================================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Verificar que Supabase está listo
            if (!supabaseClient) {
                mostrarMensaje('❌ Error: Supabase no está inicializado. Recarga la página.', 'error');
                return;
            }

            // Mostrar estado de carga en el botón
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner"></span> Registrando...';
            mensajeDiv.className = 'message'; // Ocultar mensaje anterior
            mensajeDiv.textContent = '';

            // Recoger los datos del formulario
            const datos = {
                nombre:    document.getElementById('nombre').value.trim(),
                email:     document.getElementById('email').value.trim(),
                telefono:  document.getElementById('telefono').value.trim(),
                documento: document.getElementById('documento').value.trim(),
                contrasena: document.getElementById('contrasena').value
            };

            console.log('📤 Enviando datos:', JSON.stringify(datos));

            try {
                const { data, error } = await supabaseClient
                    .from('registros')
                    .insert([datos])
                    .select();

                console.log('📥 Respuesta de Supabase:', { data, error });

                if (error) {
                    throw error;
                }

                // ✅ Éxito
                mostrarMensaje('✅ ¡Registro exitoso! Tus datos han sido guardados.', 'success');
                form.reset();

            } catch (error) {
                console.error('❌ Error al registrar:', error);

                let errorMsg = 'No se pudo completar el registro.';
                if (error.message) {
                    errorMsg = error.message;
                }
                if (error.code === '23505') {
                    errorMsg = 'Ya existe un registro con ese documento o correo electrónico.';
                }
                if (error.code === '42501') {
                    errorMsg = 'Permisos insuficientes. Verifica las políticas RLS de la tabla.';
                }

                mostrarMensaje('❌ Error: ' + errorMsg, 'error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Registrarse';
            }
        });
    </script>

</body>
</html>
